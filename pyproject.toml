[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
pythonpath = ["."]
filterwarnings = [
  "ignore:coroutine '_wrap_asyncgen_fixture.*:DeprecationWarning",
  "ignore::ResourceWarning"
]

[tool.ruff]
target-version = "py313"
line-length = 130

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B", "SIM"]
